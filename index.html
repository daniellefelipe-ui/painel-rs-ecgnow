async function gerarRelatorioDisc(bancoId) {
    const key = getClaudeKey();
    if (!key) { openKeyModal(); return; }

    const { data: c } = await sb.from('banco_talentos').select('*').eq('id', bancoId).single();
    if (!c) return;

    const total = c.disc_e + c.disc_c + c.disc_p + c.disc_a;
    const pct = v => ((v / total) * 100).toFixed(1);
    const nivel = v => v / total >= 0.26 ? 'ALTO' : 'BAIXO';

    showModal(`
        <div class="modal-header">
            <div>
                <div style="font-family:'Montserrat',sans-serif;font-weight:700">Relatório Comportamental</div>
                <div style="font-size:.82rem;color:var(--muted);margin-top:3px">${c.nome}</div>
            </div>
            <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-body" id="disc-report-body">
            <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px">
                ${[['Executor','disc_e','#dc2626'],['Comunicador','disc_c','#d97706'],['Planejador','disc_p','#16a34a'],['Analista','disc_a','#2563eb']].map(([nome,key,cor]) => `
                <div style="text-align:center;padding:16px 8px;background:#f9fafb;border-radius:10px;border:2px solid ${c.disc_perfil?.includes(nome) ? cor : '#e5e7eb'}">
                    <div style="font-size:1.4rem;font-weight:800;color:${cor}">${pct(c[key])}%</div>
                    <div style="font-size:.8rem;font-weight:700;color:#374151;margin-top:2px">${nome}</div>
                    <div style="font-size:.72rem;color:${c[key]/total>=0.26?cor:'#9ca3af'};font-weight:600">${nivel(c[key])}</div>
                </div>`).join('')}
            </div>
            <div style="text-align:center;margin-bottom:20px">
                <div style="font-size:.8rem;color:var(--muted)">Perfil predominante</div>
                <div style="font-family:'Montserrat',sans-serif;font-size:1.5rem;font-weight:800;color:var(--text)">${c.disc_perfil}</div>
            </div>
            <div id="disc-analise-area" style="background:#f9fafb;border-radius:10px;padding:20px;min-height:80px;display:flex;align-items:center;justify-content:center;color:var(--muted)">
                Clique em "Gerar análise" para o Claude criar o relatório comportamental completo.
            </div>
        </div>
        <div class="modal-actions">
            <button class="btn btn-primary btn-sm" onclick="chamarClaudeDisc('${bancoId}')">✨ Gerar análise</button>
            <button class="btn btn-outline" onclick="closeModal()">Fechar</button>
        </div>`);
}

async function chamarClaudeDisc(bancoId) {
    const key = getClaudeKey();
    const { data: c } = await sb.from('banco_talentos').select('*').eq('id', bancoId).single();
    if (!c) return;

    const area = document.getElementById('disc-analise-area');
    area.innerHTML = `<div class="loading">Gerando relatório...</div>`;

    const total = c.disc_e + c.disc_c + c.disc_p + c.disc_a;
    const pct = v => ((v / total) * 100).toFixed(1);

    const scoresB = [
        { dim: 'Executor (D)', val: c.disc_e||0, pct: pct(c.disc_e||0) },
        { dim: 'Comunicador (I)', val: c.disc_c||0, pct: pct(c.disc_c||0) },
        { dim: 'Planejador (S)', val: c.disc_p||0, pct: pct(c.disc_p||0) },
        { dim: 'Analista (C)', val: c.disc_a||0, pct: pct(c.disc_a||0) },
    ].sort((a, b) => b.val - a.val);

    const prompt = `Você é um especialista em comportamento humano e avaliação DISC com base no conhecimento científico e aplicado sobre os 4 fatores comportamentais.

Gere um relatório comportamental DISC personalizado e analítico para o candidato abaixo. O relatório deve refletir fielmente a combinação ESPECÍFICA dos percentuais — não use descrições genéricas. Analise as proporções entre as dimensões e como isso se manifesta de forma única nessa pessoa.

CANDIDATO: ${c.nome}
ÁREA DE INTERESSE: ${c.area_interesse || 'Não informada'}
PERFIL DOMINANTE: ${c.disc_perfil}
PONTUAÇÃO DETALHADA (ordenada por intensidade):
${scoresB.map(s => `- ${s.dim}: ${s.val} pontos (${s.pct}%)`).join('\n')}

INSTRUÇÕES:
- Analise as proporções específicas e o que as dimensões baixas revelam.
- NÃO use linguagem de template. Seja analítico e específico para ESSA combinação.
- Escreva em terceira pessoa usando o nome ${c.nome}.
- Formato: HTML simples com <h3>, <p>, <ul>, <li>, <strong>.

Seções:
1. Leitura do perfil (o que a combinação específica de scores revela)
2. Como ${c.nome} age sob pressão
3. Pontos fortes (específicos para essa combinação)
4. Pontos de atenção
5. Estilo de trabalho e entrega
6. Relacionamento e comunicação
7. Perfis de cargo mais compatíveis com esse comportamento
8. Recomendações para o RH`;

    try {
        const resp = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: {
                'x-api-key': key,
                'anthropic-version': '2023-06-01',
                'content-type': 'application/json',
                'anthropic-dangerous-direct-browser-access': 'true',
            },
            body: JSON.stringify({
                model: 'claude-sonnet-4-6',
                max_tokens: 2000,
                messages: [{ role: 'user', content: prompt }],
            }),
        });
        const data = await resp.json();
        const html = data.content?.[0]?.text || 'Erro ao gerar relatório.';
        area.innerHTML = `<div style="line-height:1.7;font-size:.88rem">${html}</div>`;
    } catch(err) {
        area.innerHTML = `<span style="color:red">Erro: ${err.message}</span>`;
    }
}

async function gerarRelatorioDiscCandidatura(candidaturaId) {
    const key = getClaudeKey();
    if (!key) { openKeyModal(); return; }

    const { data: c } = await sb.from('candidaturas').select('*, vaga:vagas(titulo, setor, cargo_titulo)').eq('id', candidaturaId).single();
    if (!c?.disc_perfil) return;

    const area = document.getElementById(`disc-relatorio-${candidaturaId}`);
    if (!area) return;
    area.innerHTML = `<div class="loading" style="margin-top:12px">Gerando relatório comportamental...</div>`;

    const total = (c.disc_e||0) + (c.disc_c||0) + (c.disc_p||0) + (c.disc_a||0);
    const pct = v => total ? ((v / total) * 100).toFixed(1) : '0.0';

    // Identifica a dimensão dominante e secundária com precisão
    const scores = [
        { dim: 'Executor (D)', val: c.disc_e||0, pct: pct(c.disc_e||0) },
        { dim: 'Comunicador (I)', val: c.disc_c||0, pct: pct(c.disc_c||0) },
        { dim: 'Planejador (S)', val: c.disc_p||0, pct: pct(c.disc_p||0) },
        { dim: 'Analista (C)', val: c.disc_a||0, pct: pct(c.disc_a||0) },
    ].sort((a, b) => b.val - a.val);

    const contextoVaga = c.vaga
        ? `A pessoa está se candidatando à vaga de ${c.vaga.titulo}${c.vaga.cargo_titulo ? ` (cargo: ${c.vaga.cargo_titulo})` : ''}, no setor ${c.vaga.setor || ''}.`
        : '';

    const prompt = `Você é um especialista em comportamento humano e avaliação DISC com base no conhecimento científico e aplicado sobre os 4 fatores comportamentais (Dominância, Influência, Estabilidade e Conformidade).

Gere um relatório comportamental DISC personalizado e analítico para o candidato abaixo. O relatório deve refletir fielmente a combinação ESPECÍFICA dos percentuais informados — não use descrições genéricas de perfil. Analise as proporções entre as dimensões, o que domina, o que é secundário e o que é baixo, e como isso se manifesta de forma única nessa pessoa.

CANDIDATO: ${c.nome}
PERFIL DOMINANTE: ${c.disc_perfil}
PONTUAÇÃO DETALHADA (ordenada por intensidade):
${scores.map(s => `- ${s.dim}: ${s.val} pontos (${s.pct}%)`).join('\n')}

${contextoVaga}

INSTRUÇÕES:
- Analise as proporções específicas. Ex: se Comunicador e Planejador estão próximos, isso é diferente de um Comunicador isolado com 60%.
- Considere o que as dimensões BAIXAS revelam tanto quanto as altas.
- Conecte o perfil ao contexto da vaga quando informado.
- NÃO use linguagem de template ou descrições copiadas de manuais. Seja analítico e específico.
- Escreva em terceira pessoa usando o nome ${c.nome}.
- Formato: HTML simples com <h3>, <p>, <ul>, <li>, <strong>.

Seções do relatório:
1. Leitura do perfil (análise das proporções reais — o que a combinação específica revela)
2. Como ${c.nome} age sob pressão (comportamento quando está fora da zona de conforto)
3. Pontos fortes (específicos para ESSA combinação de scores)
4. Pontos de atenção (riscos reais baseados nas dimensões dominantes e baixas)
5. Estilo de trabalho e entrega (ritmo, organização, relação com prazos e autonomia)
6. Relacionamento e comunicação (como interage com diferentes perfis)
7. Aderência ao cargo${contextoVaga ? ' (analise a compatibilidade com a vaga informada)' : ' (perfis de cargo mais compatíveis com esse comportamento)'}
8. Recomendações para o RH (como conduzir a entrevista e o onboarding com esse perfil)`;

    try {
        const resp = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: {
                'x-api-key': key,
                'anthropic-version': '2023-06-01',
                'content-type': 'application/json',
                'anthropic-dangerous-direct-browser-access': 'true',
            },
            body: JSON.stringify({
                model: 'claude-sonnet-4-6',
                max_tokens: 2000,
                messages: [{ role: 'user', content: prompt }],
            }),
        });
        const data = await resp.json();
        const html = data.content?.[0]?.text || 'Erro ao gerar relatório.';
        area.innerHTML = `<div style="line-height:1.7;font-size:.88rem;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">${html}</div>`;
    } catch(err) {
        area.innerHTML = `<span style="color:red">Erro: ${err.message}</span>`;
    }
}

function renderEcgResultado(testeEcg, candidaturaId) {
    const pct = testeEcg.total_pct ?? 0;
    const aprovado = testeEcg.aprovado ?? pct >= 75;
    const cor = aprovado ? '#16a34a' : '#dc2626';
    const comentario = testeEcg.comentario || '';
    const questoes = testeEcg.questoes || [];
    const alertas = questoes.filter(q => q.alerta);
    const editadoMarco = testeEcg.editado_marco;

    const questoesHtml = !questoes.length
        ? `<div style="font-size:.8rem;color:var(--muted);margin-bottom:12px;padding:10px 12px;background:#f8fafc;border:1px solid var(--border);border-radius:8px">ℹ️ Detalhe por questão não disponível — execute a correção novamente na aba Teste ECG.</div>`
        : `<div style="max-height:380px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;margin-bottom:12px" id="ecg-questoes-${candidaturaId}">
            ${questoes.map((q, qi) => ecgRenderQuestaoItem(q, qi, candidaturaId)).join('')}
        </div>
        <button class="btn btn-primary btn-sm" onclick="ecgSalvarEdicaoMarco('${candidaturaId}',event)" style="margin-bottom:12px">
            💾 Salvar edições do Dr. Marco
        </button>`;

    return `
        <div style="background:${aprovado ? '#f0fdf4' : '#fef2f2'};border:1px solid ${aprovado ? '#bbf7d0' : '#fecaca'};border-radius:10px;padding:16px;margin-bottom:12px">
            <div style="display:flex;align-items:center;justify-content:space-between">
                <div style="display:flex;align-items:center;gap:10px">
                    <span id="ecg-score-live-${candidaturaId}" style="font-size:1.5rem;font-weight:800;color:${cor}">${pct}%</span>
                    <span style="font-size:.875rem;font-weight:600;color:${cor}">${aprovado ? '✅ Aprovado' : '❌ Reprovado'}</span>
                    ${alertas.length ? `<span style="font-size:.78rem;background:#fff7ed;color:#c2410c;border:1px solid #fed7aa;border-radius:20px;padding:2px 8px">⚠️ ${alertas.length} alerta${alertas.length > 1 ? 's' : ''}</span>` : ''}
                    ${editadoMarco ? `<span style="font-size:.72rem;background:#ede9fe;color:#6d28d9;border-radius:20px;padding:2px 8px">✏️ Editado Dr. Marco</span>` : ''}
                </div>
                <span style="font-size:.75rem;color:var(--muted)">Corrigido em ${testeEcg.corrigido_em ? new Date(testeEcg.corrigido_em).toLocaleDateString('pt-BR') : '—'}</span>
            </div>
        </div>
        ${questoesHtml}
        <div style="margin-bottom:12px">
            <label style="font-size:.78rem;font-weight:600;color:var(--muted);display:block;margin-bottom:5px">Comentário (Dr. Marco)</label>
            <textarea id="ecg-comentario-${candidaturaId}" rows="2" style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:.875rem;font-family:'Inter',sans-serif;resize:vertical" placeholder="Adicionar observação sobre o desempenho...">${comentario}</textarea>
        </div>
        <button class="btn btn-outline btn-sm" onclick="ecgSalvarComentario('${candidaturaId}')">Salvar comentário</button>`;
}

function ecgRenderQuestaoItem(q, qi, cid) {
    const bg = q.nota_pct >= 100 ? '#f0fdf4' : q.nota_pct > 0 ? '#fefce8' : q.alerta ? '#fef2f2' : '#f9fafb';
    const borda = q.alerta ? '2px solid #fca5a5' : '1px solid var(--border)';
    const gab = q.gabarito || [];
    const compHtml = gab.map((comp, ci) => {
        const p = q.presentes ? q.presentes[ci] : null;
        const cbg  = p === true ? '#dcfce7' : p === false ? '#fee2e2' : '#f1f5f9';
        const ccol = p === true ? '#15803d' : p === false ? '#9f1239' : '#64748b';
        const cborder = p === true ? '#86efac' : p === false ? '#fca5a5' : '#cbd5e1';
        const icon = p === true ? '✓' : p === false ? '✗' : '·';
        return `<button onclick="ecgToggleComp('${cid}',${qi},${ci})" title="Clique para alternar" style="background:${cbg};color:${ccol};border:1px solid ${cborder};border-radius:4px;padding:2px 8px;font-size:10px;margin:1px 2px 2px 0;cursor:pointer;font-weight:600;font-family:inherit;transition:all .15s">${icon} ${comp}</button>`;
    }).join('');
    const alertaVal = (q.alerta || '').replace(/"/g, '&quot;');
    const notaCor = q.nota_pct >= 100 ? '#16a34a' : q.nota_pct > 0 ? '#d97706' : '#dc2626';
    return `<div id="ecg-q-${cid}-${qi}" style="background:${bg};border:${borda};border-radius:8px;padding:10px 12px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
            <strong style="font-size:.8rem">Q${q.q}${q.bonus ? ' ⭐' : ''}</strong>
            <span id="ecg-nota-${cid}-${qi}" style="font-weight:700;font-size:.8rem;color:${notaCor}">${q.nota_pct}%</span>
        </div>
        <div style="margin-bottom:6px;line-height:2">${compHtml}</div>
        <div style="font-size:.78rem;color:var(--text);background:rgba(0,0,0,.04);border-radius:5px;padding:5px 8px;margin-bottom:6px"><em>"${q.resposta}"</em></div>
        <input type="text" value="${alertaVal}" placeholder="⚠️ Alerta (deixe vazio se não houver)"
            oninput="ecgEditarAlerta('${cid}',${qi},this.value)"
            style="width:100%;padding:4px 8px;border:1px solid ${q.alerta ? '#fca5a5' : 'var(--border)'};border-radius:5px;font-size:.75rem;font-family:inherit;color:${q.alerta ? '#c2410c' : 'var(--text)'}">
    </div>`;
}

function ecgToggleComp(cid, qi, ci) {
    const ed = (window._ecgEdicao || {})[cid];
    if (!ed) return;
    const q = ed.questoes[qi];
    if (!q) return;
    if (!q.presentes) q.presentes = (q.gabarito || []).map(() => false);
    q.presentes[ci] = !q.presentes[ci];
    if (!q.bonus && q.gabarito?.length) {
        q.nota_pct = Math.round((q.presentes.filter(Boolean).length / q.gabarito.length) * 100);
    }
    ed.modificado = true;
    const card = document.getElementById(`ecg-q-${cid}-${qi}`);
    if (card) card.outerHTML = ecgRenderQuestaoItem(q, qi, cid);
    ecgAtualizarScoreTotal(cid);
}

function ecgEditarAlerta(cid, qi, valor) {
    const ed = (window._ecgEdicao || {})[cid];
    if (!ed) return;
    ed.questoes[qi].alerta = valor.trim() || null;
    ed.modificado = true;
}

function ecgAtualizarScoreTotal(cid) {
    const ed = (window._ecgEdicao || {})[cid];
    if (!ed || !ed.questoes.length) return;
    const soma = ed.questoes.reduce((s, q) => s + (q.nota_pct || 0), 0);
    const pct = Math.round(soma / ed.questoes.length);
    const el = document.getElementById(`ecg-score-live-${cid}`);
    if (el) { el.textContent = pct + '%'; el.style.color = pct >= 75 ? '#16a34a' : '#dc2626'; }
}

async function ecgSalvarEdicaoMarco(cid, evt) {
    const ed = (window._ecgEdicao || {})[cid];
    if (!ed) return;
    const btn = evt?.target;
    if (btn) { btn.disabled = true; btn.textContent = 'Salvando...'; }
    const { data: c } = await sb.from('candidaturas').select('teste_ecg').eq('id', cid).single();
    if (!c?.teste_ecg) { toast('Erro: dados não encontrados', 'error'); if (btn) { btn.disabled = false; btn.textContent = '💾 Salvar edições do Dr. Marco'; } return; }
    const soma = ed.questoes.reduce((s, q) => s + (q.nota_pct || 0), 0);
    const totalPct = Math.round(soma / ed.questoes.length);
    const atualizado = {
        ...c.teste_ecg,
        questoes: ed.questoes,
        notas: ed.questoes.map(q => q.nota_pct / 100),
        total_pct: totalPct,
        aprovado: totalPct >= 75,
        alertas_count: ed.questoes.filter(q => q.alerta).length,
        editado_marco: true,
        editado_em: new Date().toISOString(),
    };
    const { error } = await sb.from('candidaturas').update({ teste_ecg: atualizado }).eq('id', cid);
    if (error) { toast('Erro ao salvar: ' + error.message, 'error'); if (btn) { btn.disabled = false; btn.textContent = '💾 Salvar edições do Dr. Marco'; } return; }
    toast('Edições do Dr. Marco salvas! ✅');
    ed.modificado = false;
    // Atualiza badge no topo do modal
    const scoreEl = document.getElementById(`ecg-score-live-${cid}`);
    if (scoreEl) { scoreEl.textContent = totalPct + '%'; scoreEl.style.color = totalPct >= 75 ? '#16a34a' : '#dc2626'; }
    if (btn) { btn.textContent = '✅ Salvo'; btn.style.background = '#16a34a'; setTimeout(() => { if (btn) { btn.disabled = false; btn.textContent = '💾 Salvar edições do Dr. Marco'; btn.style.background = ''; } }, 2500); }
    if (S.vaga) loadCandidatos(S.vaga.id); // atualiza badge no Kanban
}

async function ecgSalvarComentario(candidaturaId) {
    const textarea = document.getElementById(`ecg-comentario-${candidaturaId}`);
    if (!textarea) return;
    const { data: c } = await sb.from('candidaturas').select('teste_ecg').eq('id', candidaturaId).single();
    if (!c?.teste_ecg) return;
    const atualizado = { ...c.teste_ecg, comentario: textarea.value };
    const { error } = await sb.from('candidaturas').update({ teste_ecg: atualizado }).eq('id', candidaturaId);
    if (error) { toast('Erro ao salvar', 'error'); return; }
    toast('Comentário salvo!');
}

    el.innerHTML = `

function ecgImportarExcel(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
        try {
            const wb = XLSX.read(e.target.result, { type: 'array' });
            const abaNome = wb.SheetNames.find(n => n.toLowerCase().includes('resposta') || n.toLowerCase().includes('formul')) || wb.SheetNames[0];
            const ws = wb.Sheets[abaNome];
            const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
            if (rows.length < 2) { toast('Planilha sem dados', 'error'); return; }
            ecgRespostas = [];
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                const nome = (row[2] || '').toString().trim();
                if (!nome) continue;
                const obj = { nome };
                for (let q = 1; q <= 30; q++) obj['q' + q] = (row[2 + q] || '').toString().trim();
                ecgRespostas.push(obj);
            }
            ecgResultados = [];
            const statusEl = document.getElementById('ecgStatus');
            if (statusEl) statusEl.textContent = '';
            const exportBtn = document.getElementById('ecgBtnExportar');
            if (exportBtn) exportBtn.style.display = 'none';
            ecgRenderSelecao();
            toast(`${ecgRespostas.length} candidatos carregados`);
        } catch(err) { toast('Erro ao ler Excel: ' + err.message, 'error'); }
    };
    reader.readAsArrayBuffer(file);
    input.value = '';
}

function ecgRenderSelecao() {
    const wrap = document.getElementById('ecgResultWrap');
    if (!wrap) return;
    const itens = ecgRespostas.map((c, i) => `
        <label style="display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:6px;cursor:pointer;transition:background .1s" onmouseover="this.style.background='#f1f5f9'" onmouseout="this.style.background=''">
            <input type="checkbox" id="ecgChk_${i}" checked style="width:15px;height:15px;cursor:pointer">
            <span style="font-size:.875rem;color:var(--text)">${c.nome}</span>
        </label>`).join('');
    wrap.innerHTML = `
        <div style="border:1px solid var(--border);border-radius:10px;overflow:hidden">
            <div style="padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);background:#f8fafc">
                <span style="font-size:.875rem;font-weight:600">${ecgRespostas.length} candidatos encontrados</span>
                <button class="btn btn-outline btn-sm" onclick="ecgSelecionarTodos(true)">Selecionar todos</button>
                <button class="btn btn-outline btn-sm" onclick="ecgSelecionarTodos(false)">Limpar seleção</button>
            </div>
            <div style="padding:8px 16px;max-height:280px;overflow-y:auto">${itens}</div>
            <div style="padding:12px 16px;border-top:1px solid var(--border);background:#f8fafc">
                <button class="btn btn-primary" onclick="ecgCorrigirSelecionados()">▶ Corrigir selecionados</button>
            </div>
        </div>`;
}

function ecgSelecionarTodos(val) {
    ecgRespostas.forEach((_, i) => { const c = document.getElementById('ecgChk_' + i); if (c) c.checked = val; });
}

async function ecgCorrigirCandidato(candidato, exemplosMarco = []) {
    const perguntas = Object.entries(ECG_GABARITO)
        .filter(([q]) => !ECG_BONUS_QUESTOES.includes(Number(q)))
        .map(([q, comps]) =>
            `Q${q} (${comps.length} componente${comps.length > 1 ? 's' : ''}):\n  Gabarito: ${comps.join(' | ')}\n  Resposta: "${candidato['q' + q] || '(em branco)'}"`
        ).join('\n\n');

    const exemplosHtml = exemplosMarco.length
        ? '\nCORREÇÕES DO DR. MARCO (use como referência de critério):\n' +
          exemplosMarco.map(ex =>
              '  Q' + ex.q + ' | Gabarito: ' + (ex.gabarito||[]).join(' | ') +
              ' | Resposta: "' + ex.resposta + '" | Presentes: [' +
              (ex.presentes||[]).map(p => p ? 'sim' : 'nao').join(', ') + ']' +
              (ex.alerta ? ' | Alerta: "' + ex.alerta + '"' : '')
          ).join('\n') + '\n'
        : '';

    const prompt = `Você é um avaliador especialista em eletrocardiografia médica. Avalie as respostas do candidato e identifique erros clinicamente relevantes.
${exemplosHtml}

REGRAS DE PONTUAÇÃO:
- Aceite sinônimos e abreviações médicas (RS=ritmo sinusal, BRD=bloqueio de ramo direito, FA=fibrilação atrial, SAE=sobrecarga atrial esquerda, SVE=sobrecarga ventricular esquerda, BAVT=bloqueio atrioventricular total, TV=taquicardia ventricular, MP=marcapasso, BRE=bloqueio de ramo esquerdo, BDASE=bloqueio divisional anterossuperior esquerdo, ZEI=zona/área elétrica inativa, TPSV=taquicardia supraventricular, TRN=taquicardia por reentrada nodal, WPW=wolf-parkinson-white, etc.)
- Para Q21: aceite qualquer menção a velocidade 50mm/s ou velocidade errada/dobrada
- Seja generoso com variações de escrita desde que o conceito esteja correto

REGRAS PARA O CAMPO "alerta":
- Use null se acertou tudo OU se errou apenas por omissão simples (esqueceu um componente secundário)
- Use uma string curta e objetiva (máx 120 caracteres) se:
  1. Candidato descreveu diagnóstico errado ou oposto ao gabarito
  2. Erro indica gap conceitual grave para um médico analista de ECG
  3. Acertou parcialmente mas o que errou levanta dúvida clínica séria
- Exemplos de alertas: "Confundiu BAV 2:1 com ritmo sinusal — erro de raciocínio fundamental" / "Descreveu FA onde há ritmo sinusal — diagnóstico oposto" / "Não identificou área inativa — padrão de infarto ignorado"

QUESTÕES:
${perguntas}

Responda APENAS com JSON válido:
{"resultados":[{"q":1,"presentes":[true,false,true],"alerta":null},{"q":2,"presentes":[false],"alerta":"texto do alerta ou null"},...]}`;

    const resp = await fetch('https://ecg-proxy-18dw.vercel.app/api/corrigir', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ model: 'claude-haiku-4-5-20251001', max_tokens: 2048, temperature: 0, messages: [{ role: 'user', content: prompt }] }),
    });
    if (!resp.ok) { const err = await resp.json().catch(() => ({})); throw new Error(err.error?.message || `HTTP ${resp.status}`); }
    const data = await resp.json();
    const match = data.content[0].text.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('Resposta inválida da API');
    return JSON.parse(match[0]);
}

async function ecgCorrigirSelecionados() {
    const selecionados = ecgRespostas.filter((_, i) => { const c = document.getElementById('ecgChk_' + i); return c && c.checked; });
    if (!selecionados.length) { toast('Selecione ao menos um candidato', 'error'); return; }

    const wrap = document.getElementById('ecgResultWrap');
    if (wrap) wrap.innerHTML = '';
    const exportBtn = document.getElementById('ecgBtnExportar');
    if (exportBtn) exportBtn.style.display = 'none';
    ecgResultados = [];

    const statusEl = document.getElementById('ecgStatus');

    // Busca correções do Dr. Marco para usar como exemplos (aprendizado)
    let exemplosMarco = [];
    if (S.vaga?.id) {
        const { data: corrigidos } = await sb.from('candidaturas')
            .select('teste_ecg')
            .eq('vaga_id', S.vaga.id)
            .not('teste_ecg', 'is', null);
        if (corrigidos?.length) {
            corrigidos.forEach(c => {
                if (c.teste_ecg?.editado_marco && c.teste_ecg?.questoes?.length) {
                    c.teste_ecg.questoes.forEach(q => {
                        if (q.presentes && (q.alerta || q.nota_pct < 100)) exemplosMarco.push(q);
                    });
                }
            });
            exemplosMarco = exemplosMarco.slice(0, 10); // máx 10 exemplos
        }
    }
    if (exemplosMarco.length && statusEl) statusEl.textContent = `📚 ${exemplosMarco.length} correção(ões) do Dr. Marco carregadas como referência...`;

    for (let i = 0; i < selecionados.length; i++) {
        const candidato = selecionados[i];
        if (statusEl) statusEl.textContent = `⏳ Corrigindo ${i + 1}/${selecionados.length}: ${candidato.nome}...`;
        try {
            const resultado = await ecgCorrigirCandidato(candidato, exemplosMarco);
            const notas = []; const questoes = []; let totalPontos = 0;
            for (let q = 1; q <= 30; q++) {
                const gabComp = ECG_GABARITO[q];
                const bonus = ECG_BONUS_QUESTOES.includes(q);
                let nota, alerta = null, presentes = [];
                if (bonus) {
                    nota = 1;
                    presentes = [true];
                } else {
                    const resQ = resultado.resultados?.find(r => r.q === q);
                    presentes = resQ?.presentes || gabComp.map(() => false);
                    const acertos = presentes.filter(Boolean).length;
                    nota = parseFloat((acertos / gabComp.length).toFixed(4));
                    alerta = resQ?.alerta || null;
                }
                notas.push(nota);
                totalPontos += nota;
                questoes.push({
                    q,
                    gabarito: bonus ? ['questão de especialista (bonus)'] : gabComp,
                    presentes,
                    resposta: candidato['q' + q] || '(em branco)',
                    nota_pct: Math.round(nota * 100),
                    alerta,
                    bonus,
                });
            }
            ecgResultados.push({ nome: candidato.nome, notas, questoes, total: parseFloat(totalPontos.toFixed(2)), respostas: candidato });
        } catch(err) {
            ecgResultados.push({ nome: candidato.nome, notas: Array(30).fill(0), total: 0, erro: err.message });
            toast(`Erro em ${candidato.nome}: ${err.message}`, 'error');
        }
        if (i < selecionados.length - 1) await new Promise(r => setTimeout(r, 800));
    }

    if (statusEl) statusEl.textContent = `✅ Correção concluída! ${ecgResultados.length} candidatos processados.`;
    if (exportBtn) exportBtn.style.display = '';
    ecgRenderTabela();
    await ecgSalvarNoSupabase();
}

async function ecgSalvarNoSupabase() {
    if (!S.vaga?.id || !ecgResultados.length) return;

    // Busca candidaturas da vaga para vincular pelo nome
    const { data: candidaturas } = await sb.from('candidaturas').select('id, nome').eq('vaga_id', S.vaga.id);
    if (!candidaturas?.length) return;

    let salvos = 0;
    for (const resultado of ecgResultados) {
        if (resultado.erro) continue;
        const totalPct = Math.round((resultado.total / 30) * 100);

        // Tenta encontrar a candidatura pelo nome (normalizado)
        const normalizar = s => s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').trim();
        const nomeResultado = normalizar(resultado.nome);
        const candidatura = candidaturas.find(c => normalizar(c.nome) === nomeResultado)
            || candidaturas.find(c => normalizar(c.nome).includes(nomeResultado) || nomeResultado.includes(normalizar(c.nome)));

        if (!candidatura) continue;

        const testeEcg = {
            total_pct: totalPct,
            aprovado: totalPct >= 75,
            notas: resultado.notas,
            questoes: resultado.questoes || [],
            alertas_count: (resultado.questoes || []).filter(q => q.alerta).length,
            corrigido_em: new Date().toISOString(),
            comentario: '',
        };

        await sb.from('candidaturas').update({ teste_ecg: testeEcg }).eq('id', candidatura.id);
        salvos++;
    }

    if (salvos > 0) toast(`${salvos} resultado(s) salvos no painel`);
}

function ecgRenderTabela() {
    if (!ecgResultados.length) return;
    const wrap = document.getElementById('ecgResultWrap');
    if (!wrap) return;
    const thsQ = Array.from({length:30}, (_,i) => `<th style="text-align:center;min-width:40px;font-size:10px;padding:6px 4px">Q${i+1}</th>`).join('');
    const rows = ecgResultados.map((r, idx) => {
        const totalPct = Math.round((r.total / 30) * 100);
        const corNota = totalPct >= 75 ? '#16a34a' : totalPct >= 50 ? '#d97706' : '#dc2626';
        const tdsQ = r.notas.map(n => {
            const bg = n >= 1 ? '#dcfce7' : n > 0 ? '#fef9c3' : '#fee2e2';
            return `<td style="text-align:center;background:${bg};font-size:11px;padding:6px 4px">${Math.round(n*100)}%</td>`;
        }).join('');
        const alertasCount = (r.questoes || []).filter(q => q.alerta).length;
        const status = totalPct >= 75 ? '<span style="color:#16a34a;font-size:11px">✅ Aprovado</span>' : '<span style="color:#dc2626;font-size:11px">❌ Reprovado</span>';
        const erroTag = r.erro ? `<span title="${r.erro}" style="color:#ef4444;margin-left:4px">⚠️</span>` : '';
        const alertaTag = alertasCount ? `<span style="margin-left:6px;font-size:10px;background:#fff7ed;color:#c2410c;border:1px solid #fed7aa;border-radius:10px;padding:1px 6px">⚠️ ${alertasCount}</span>` : '';
        return `<tr style="cursor:pointer" onclick="ecgVerDetalhe(${idx})" title="Clique para ver detalhes">
            <td style="font-size:.875rem;white-space:nowrap;padding:8px 14px;position:sticky;left:0;background:white">${r.nome}${erroTag}${alertaTag}</td>
            ${tdsQ}
            <td style="text-align:center;font-weight:700;color:${corNota};padding:8px 10px;position:sticky;right:60px;background:white">${totalPct}%</td>
            <td style="padding:8px 10px;position:sticky;right:0;background:white">${status}</td>
        </tr>`;
    }).join('');
    wrap.innerHTML = `
        <div style="margin-bottom:10px;display:flex;justify-content:space-between;align-items:center">
            <span style="font-size:.875rem;font-weight:600">${ecgResultados.length} candidatos · clique para ver detalhes</span>
            <span style="font-size:.75rem;color:var(--muted)">Verde = acerto total · Amarelo = parcial · Vermelho = zero · Aprovação ≥75%</span>
        </div>
        <div style="overflow-x:auto;border:1px solid var(--border);border-radius:10px">
            <table style="width:100%;border-collapse:collapse;font-size:.8rem">
                <thead style="background:#f8fafc">
                    <tr>
                        <th style="text-align:left;padding:8px 14px;min-width:200px;position:sticky;left:0;background:#f8fafc;border-bottom:1px solid var(--border)">Candidato</th>
                        ${thsQ}
                        <th style="text-align:center;min-width:60px;padding:6px;position:sticky;right:60px;background:#f8fafc;border-bottom:1px solid var(--border)">Total</th>
                        <th style="min-width:90px;padding:6px;position:sticky;right:0;background:#f8fafc;border-bottom:1px solid var(--border)">Status</th>
                    </tr>
                </thead>
                <tbody>${rows}</tbody>
            </table>
        </div>`;
}

function ecgVerDetalhe(idx) {
    const r = ecgResultados[idx];
    if (!r) return;
    const totalPct = Math.round((r.total / 30) * 100);
    const status = totalPct >= 75 ? '✅ APROVADO' : '❌ REPROVADO';
    const corStatus = totalPct >= 75 ? '#16a34a' : '#dc2626';
    const alertas = (r.questoes || []).filter(q => q.alerta);

    const alertasSummary = alertas.length ? `
        <div style="background:#fff7ed;border:1px solid #fed7aa;border-radius:8px;padding:12px 14px;margin-bottom:12px">
            <div style="font-size:.8rem;font-weight:700;color:#c2410c;margin-bottom:8px">⚠️ ${alertas.length} alerta${alertas.length > 1 ? 's' : ''} de discrepância</div>
            ${alertas.map(a => `<div style="font-size:.78rem;margin-bottom:4px"><span style="font-weight:700;color:#c2410c">Q${a.q} · ${a.nota_pct}%</span> — <span style="color:#7c2d12">${a.alerta}</span></div>`).join('')}
        </div>` : '';

    const questoes = Array.from({length:30}, (_, i) => {
        const q = i + 1;
        const qData = r.questoes?.[i];
        const comps = qData?.gabarito || ECG_GABARITO[q];
        const nota = r.notas[i];
        const pct = Math.round(nota * 100);
        const alerta = qData?.alerta || null;
        const bg = pct >= 100 ? '#f0fdf4' : pct > 0 ? '#fefce8' : alerta ? '#fef2f2' : '#f9fafb';
        const borda = alerta ? '1px solid #fecaca' : '1px solid #e5e7eb';
        const resposta = qData?.resposta || r.respostas?.['q' + q] || '(em branco)';
        const compItems = (comps || []).map(c => `<span style="display:inline-block;background:#e0f2fe;color:#0369a1;border-radius:4px;padding:2px 7px;font-size:10px;margin:2px">${c}</span>`).join('');
        return `<div style="background:${bg};border:${borda};border-radius:8px;padding:12px 14px;margin-bottom:8px">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
                <strong style="font-size:.875rem">Q${q}${qData?.bonus ? ' ⭐ bonus' : ''}</strong>
                <span style="font-weight:700;font-size:.875rem;color:${pct>=100?'#16a34a':pct>0?'#d97706':'#dc2626'}">${pct}%</span>
            </div>
            <div style="margin-bottom:4px"><span style="font-size:.75rem;color:var(--muted)">Gabarito:</span> ${compItems}</div>
            <div style="font-size:.8rem;color:var(--text);background:rgba(0,0,0,.04);border-radius:6px;padding:6px 10px;margin-top:4px"><em>"${resposta}"</em></div>
            ${alerta ? `<div style="font-size:.75rem;color:#c2410c;margin-top:6px;font-weight:500;display:flex;gap:5px"><span>⚠️</span><span>${alerta}</span></div>` : ''}
        </div>`;
    }).join('');

    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';
    overlay.innerHTML = `
        <div style="background:#fff;border-radius:12px;width:100%;max-width:800px;max-height:90vh;display:flex;flex-direction:column">
            <div style="padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
                <div>
                    <div style="font-family:'Montserrat',sans-serif;font-weight:700;font-size:1.1rem">${r.nome}</div>
                    <span style="font-size:.9rem;font-weight:700;color:${corStatus}">${status} — ${totalPct}%</span>
                    ${alertas.length ? `<span style="margin-left:8px;font-size:.78rem;background:#fff7ed;color:#c2410c;border:1px solid #fed7aa;border-radius:20px;padding:2px 8px">⚠️ ${alertas.length} alerta${alertas.length>1?'s':''}</span>` : ''}
                </div>
                <button onclick="this.closest('[data-ecg-overlay]').remove()" style="background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted)">✕</button>
            </div>
            <div style="overflow-y:auto;padding:16px 24px;flex:1">${alertasSummary}${questoes}</div>
        </div>`;
    overlay.dataset.ecgOverlay = '1';
    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
    document.body.appendChild(overlay);
}

function ecgExportarExcel() {
    if (!ecgResultados.length) { toast('Nada para exportar', 'error'); return; }
    const cabecalho = ['Candidato', ...Array.from({length:30}, (_,i) => `Q${i+1}`), 'Total (%)', 'Status'];
    const linhas = ecgResultados.map(r => {
        const totalPct = Math.round((r.total / 30) * 100);
        return [r.nome, ...r.notas.map(n => Math.round(n * 100) + '%'), totalPct + '%', totalPct >= 75 ? 'Aprovado' : 'Reprovado'];
    });
    const ws = XLSX.utils.aoa_to_sheet([cabecalho, ...linhas]);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Resultado ECG');
    XLSX.writeFile(wb, `resultado-ecg-${new Date().toISOString().slice(0,10)}.xlsx`);
    toast('Excel exportado!');
}

// ================================================================
function showModal(html) {
    document.getElementById('modal-content').innerHTML = html;
    document.getElementById('modal-overlay').classList.remove('hidden');
    document.body.style.overflow = 'hidden';
}
function closeModal() {
    document.getElementById('modal-overlay').classList.add('hidden');
    document.body.style.overflow = '';
    clearInterval(window._dotInterval);
}
function handleOverlayClick(e) {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function classifBadge(c) {
    const m = { 'Altamente compatível':'bg-green', 'Compatível':'bg-blue', 'Potencial':'bg-amber', 'Pouco compatível':'bg-gray' };
    return `<span class="badge ${m[c]||'bg-gray'}">${c}</span>`;
}
function etapaBadge(e) {
    const m = { triagem:['bg-gray','Triagem'], analise_rh:['bg-blue','Análise RH'], entrevista_rh:['bg-purple','Entrevista RH'], teste_pratico:['bg-orange','Teste Prático'], entrevista_gestor:['bg-cyan','C/ Gestor'], visao_geral:['bg-yellow','Visão Geral'], aprovado:['bg-green','✓ Aprovado'], reprovado:['bg-gray','Não avançou'] };
    const [cls,l] = m[e] || ['bg-gray',e];
    return `<span class="badge ${cls}">${l}</span>`;
}
function fmtDate(iso)     { return iso ? new Date(iso).toLocaleDateString('pt-BR') : '—'; }
function fmtDateTime(iso) { return iso ? new Date(iso).toLocaleString('pt-BR') : '—'; }
function toast(msg, type='') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = type; t.classList.remove('hidden');
    setTimeout(() => t.classList.add('hidden'), 3200);
}
